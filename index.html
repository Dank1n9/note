<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本期笔记</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f8f9fa 0%, #f0f2f5 100%);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        .note-block {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            margin-bottom: 30px;
        }

        .note-header {
            background: linear-gradient(135deg, #7b9eac 0%, #8da8b5 100%);
            padding: 30px 40px;
            color: white;
            text-align: center;
        }

        .period-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.25);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .note-title {
            font-size: 1.9rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: white;
        }

        .note-date {
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.95rem;
        }

        .note-body {
            padding: 40px;
        }

        .section-title {
            font-size: 1.2rem;
            color: #5a6f85;
            margin-bottom: 25px;
            padding-bottom: 12px;
            border-bottom: 2px solid #e8eff5;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .section-title::before,
        .section-title::after {
            content: '';
            width: 30px;
            height: 2px;
            background: #7b9eac;
        }

        .content-area {
            background: #f8fafc;
            border-radius: 12px;
            padding: 30px;
            min-height: 350px;
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.8;
            color: #4a5568;
            font-size: 1.05rem;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
        }

        .footer {
            text-align: center;
            padding: 25px;
            color: #8a9aa8;
            font-size: 1.05rem;
            letter-spacing: 3px;
            margin-top: auto;
        }

        @media (max-width: 768px) {
            body {
                padding: 25px 15px;
            }

            .note-header {
                padding: 25px 20px;
            }

            .note-body {
                padding: 25px 20px;
            }

            .content-area {
                padding: 20px;
                min-height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="note-block">
            <div class="note-header">
                <div class="period-badge">本期笔记</div>
                <div class="note-title">笔记标题</div>
                <div class="note-date">2023年11月15日</div>
            </div>

            <div class="note-body">
                <div class="section-title">主要内容</div>
                <div class="content-area">

                </div>
            </div>
        </div>

        <div class="footer">
            仅展示当期笔记 一周一变
        </div>
    </div>
</body>
</html>
